<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

<div class="container weather-container mt-5 p-4 bg-white rounded shadow-sm">

    <div class="input-group mb-4">
        <input type="text" id="city-input" class="form-control" placeholder="Nhập tên thành phố (VD: Hanoi, Tokyo, London...)">
        <button class="btn btn-primary" id="search-btn">
            <i class="bi bi-search"></i> Tìm kiếm
        </button>
    </div>

    <div class="mb-4">
        <h3 class="fw-bold mb-0 d-flex align-items-center">
            <span id="city-name">Hà Nội, VN</span>
            <img id="country-flag" src="" alt="flag" class="ms-2 d-none" style="height: 24px; border-radius: 3px;">
        </h3>
        <p class="text-muted mb-0" id="weather-desc">Đang tải dữ liệu...</p>
    </div>

    <div class="row align-items-center mb-4">
        <div class="col-auto d-flex align-items-center">
            <i id="main-icon" class="bi bi-thermometer-half text-dark weather-main-icon me-3"></i>
            <div class="d-flex align-items-start">
                <span id="main-value" class="display-1 fw-bold lh-1">-</span>
                <span id="main-unit" class="fs-3 mt-1 fw-bold">°F</span>
            </div>
        </div>
        <div class="col text-muted ms-3 border-start ps-4">
            <div id="side-humidity">Humidity: - %</div>
            <div id="side-wind">Wind: - mph</div>
            <div id="side-pressure">Pressure: - hPa</div>
            <div>UV Index: 2</div>
        </div>
    </div>

    <div class="d-flex gap-2 overflow-auto pb-3 mb-3 border-bottom weather-tabs">
        <button class="btn btn-primary rounded-pill px-3 py-1 active-tab tab-btn" data-type="temp">
            <i class="bi bi-thermometer-half"></i> Temperature
        </button>
        <button class="btn btn-outline-secondary rounded-pill px-3 py-1 tab-btn" data-type="precipitation">
            <i class="bi bi-cloud-rain"></i> Precipitation
        </button>
        <button class="btn btn-outline-secondary rounded-pill px-3 py-1 tab-btn" data-type="wind">
            <i class="bi bi-wind"></i> Wind
        </button>
        <button class="btn btn-outline-secondary rounded-pill px-3 py-1 tab-btn" data-type="air_quality">
            <i class="bi bi-moisture"></i> Air Quality
        </button>
        <button class="btn btn-outline-secondary rounded-pill px-3 py-1 tab-btn" data-type="uv_index">
            <i class="bi bi-sun"></i> UV Index
        </button>
        <button class="btn btn-outline-secondary rounded-pill px-3 py-1 tab-btn" data-type="sunset">
            <i class="bi bi-sunrise"></i> Sunset and Sunrise
        </button>
    </div>

    <div id="hourly-forecast" class="row text-center mb-4 border-bottom pb-4 hourly-scroll flex-nowrap overflow-auto">
    </div>

    <div id="daily-forecast" class="d-flex justify-content-between text-center overflow-auto gap-3">
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="static/script.js"></script>
</body>
</html>
